<div class='post-container'>
    <post-card [postSummary]='item' [index]='i' *ngFor='let item of posts; let i = index'
        (delete)='onDelete($event)'>
    </post-card>

    <div class='more' *ngIf='!loading'>
        <button mat-raised-button color='primary' (click)='onMore()'>
            more
        </button>
    </div>
</div>

<div *ngIf='loading' class='loading'>
    <img src='assets/logo/746.gif' alt='loading...'>
</div>
