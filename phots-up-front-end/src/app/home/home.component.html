<div class='panel'>
    <div class='buttons'>
        <button mat-raised-button (click)='newPost()'>
            Publish a post
        </button>
        <button mat-raised-button (click)='getRecommend()'>
            Recommendations for you
        </button>
    </div>

    <div class='user'>
        <div *ngIf='userInfo' [style]='avatarUrl()' class='ava-div'></div>
        <span>{{currUser.username}}</span>
    </div>
</div>
<mat-divider></mat-divider>
